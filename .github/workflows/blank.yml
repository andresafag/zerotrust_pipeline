# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
      
      - name: Official SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # Additional arguments to the Sonar Scanner CLI
          args: 
          # Set the sonar.projectBaseDir analysis property
          projectBaseDir: .
          # Version of the Sonar Scanner CLI to use
          scannerVersion: 8.0.1.6346
          # URL to download the Sonar Scanner CLI binaries from
          scannerBinariesUrl: https://binaries.sonarsource.com
      - name: Snyk
  # You may pin to the exact commit or the version.
  # uses: snyk/actions@b98d498629f1c368650224d6d212bf7dfa89e4bf
        uses: snyk/actions@0.4.0
        with:
    # Which Snyk command to run, defaults to test
          command: # optional, default is test
    # Additional arguments to pass to Snyk
          args: # optional
    # Output a snyk.json file with results if running the test command
          json: # optional
      - name: HashiCorp Vault
  # You may pin to the exact commit or the version.
  # uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b
        uses: hashicorp/vault-action@v3.4.0
        with:
    # The URL for the vault endpoint
          url: 
    # A semicolon-separated list of secrets to retrieve. These will automatically be converted to environmental variable keys. See README for more details
          secrets: # optional
    # A semicolon-separated list of certificates to generate. These will automatically be converted to environment variable keys. Cannot be used with "secrets". See README for more details
          pki: # optional
    # The Vault namespace from which to query secrets. Vault Enterprise only, unset by default
          namespace: # optional
    # The method to use to authenticate with Vault.
          method: # optional, default is token
    # Vault role for specified auth method
          role: # optional

          
