
name: CI

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo Hello, world!

      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      - name: HashiCorp Vault
        uses: hashicorp/vault-action@v3.4.0
        with:
          url: https://vault-cluster-public-vault-1aa221c1.75635c04.z1.hashicorp.cloud:8200
          secrets: |
            myapp/data/config SONAR_TOKEN | SONAR_TOKEN ;
            myapp/data/config SNYK_TOKEN | SNYK_TOKEN ;

          namespace: admin
          role: my-role
          token: ${{ secrets.VAULT_TOKEN }}

      - name: Official SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Snyk
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical --fail-on=all



          
 

          
